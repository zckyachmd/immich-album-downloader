name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  publish:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: bun install --frozen-lockfile

      - id: package
        run: |
          version=$(jq -r .version package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "description=$(jq -r .description package.json)" >> "$GITHUB_OUTPUT"
          echo "license=$(jq -r .license package.json)" >> "$GITHUB_OUTPUT"
          echo "author=$(jq -r .author package.json)" >> "$GITHUB_OUTPUT"
          echo "homepage=$(jq -r .homepage package.json)" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          annotations: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ steps.package.outputs.description }}
            org.opencontainers.image.url=${{ steps.package.outputs.homepage }}
            org.opencontainers.image.documentation=${{ steps.package.outputs.homepage }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=${{ steps.package.outputs.license }}
            org.opencontainers.image.authors=${{ steps.package.outputs.author }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ steps.package.outputs.description }}
            org.opencontainers.image.url=${{ steps.package.outputs.homepage }}
            org.opencontainers.image.documentation=${{ steps.package.outputs.homepage }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=${{ steps.package.outputs.license }}
            org.opencontainers.image.authors=${{ steps.package.outputs.author }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.package.outputs.version }}
            type=raw,value=${{ steps.package.outputs.tag }}
            type=sha,prefix=main-

      - id: npm_version_exists
        run: |
          if npm view "${{ github.event.repository.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.npm_version_exists.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.release_exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          ${{ steps.package.outputs.description }}

          npm package: https://www.npmjs.com/package/${{ github.event.repository.name }}/v/${{ steps.package.outputs.version }}
          Docker image: ghcr.io/${{ github.repository }}:${{ steps.package.outputs.tag }}
          Source: ${{ github.server_url }}/${{ github.repository }}
          License: ${{ steps.package.outputs.license }}
          EOF
          gh release create "${{ steps.package.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.tag }}" \
            --notes-file release-notes.md \
            --generate-notes
